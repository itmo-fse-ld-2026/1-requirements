name: Build and Publish PDF

on:
  push:
    branches: [main]

jobs:
  docker_changes:
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      owner: ${{ steps.get_owner.outputs.owner }}

    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'Dockerfile'

      - name: Set lowercase owner name
        id: get_owner
        run: echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: '${{ github.repository_owner }}'

  build_docker:
    needs: docker_changes
    if: needs.docker_changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ needs.docker_changes.outputs.owner }}/1-xetex-compiler:latest

  build_pdf:
    needs: [docker_changes, build_docker]
    if: always() && (needs.build_docker.result == 'success' || needs.build_docker.result == 'skipped')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ needs.docker_changes.outputs.owner }}/1-xetex-compiler:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Compile PDF
        run: |
          make clean
          make pdf

      - name: Prepare Pages Upload
        run: |
          mkdir public
          cp report/main.pdf public/report.pdf
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=report.pdf"></head><body><script>window.onload=function(){const a=document.createElement("a");a.href="report.pdf";a.download="report.pdf";document.body.appendChild(a);a.click();setTimeout(()=>{window.close()},2000)}</script></body></html>' > public/index.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    needs: build_pdf
    if: always() && needs.build_pdf.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4